<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siggy Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Space Grotesk',sans-serif;
background:#020202;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

/* Boot screen */

#boot{
position:absolute;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:18px;
color:#00ff9d;
}

.boot-line{
opacity:0;
animation:fade 1s forwards;
}

.boot-line:nth-child(1){animation-delay:0s}
.boot-line:nth-child(2){animation-delay:1s}
.boot-line:nth-child(3){animation-delay:2s}
.boot-line:nth-child(4){animation-delay:3s}

@keyframes fade{
to{opacity:1}
}

/* Chat UI */

#app{
display:none;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.chat-container{
width:420px;
max-width:95vw;
background:#0b0b0b;
border-radius:18px;
padding:20px;
box-shadow:0 0 40px rgba(0,255,150,.25);
}

.avatar{
text-align:center;
margin-bottom:10px;
}

.avatar img{
width:80px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-6px)}
}

h1{
text-align:center;
color:#00ff9d;
margin:6px 0;
font-weight:600;
letter-spacing:1px;
}

#chat{
height:320px;
overflow:auto;
background:#050505;
padding:12px;
border-radius:12px;
margin-bottom:10px;
font-size:14px;
}

.user{
color:#00ff9d;
margin:6px 0;
}

.bot{
color:white;
margin:6px 0;
}

.typing{
display:flex;
gap:5px;
padding:6px;
}

.dot{
width:7px;
height:7px;
background:#00ff9d;
border-radius:50%;
animation:blink 1s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%{opacity:.2}
50%{opacity:1}
100%{opacity:.2}
}

.quick{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-bottom:10px;
}

.quick button{
background:#111;
border:1px solid #00ff9d;
color:#00ff9d;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
font-family:'Space Grotesk',sans-serif;
font-size:12px;
}

.input-box{
display:flex;
gap:8px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#111;
color:white;
font-family:'Space Grotesk',sans-serif;
}

button{
padding:12px 16px;
background:#00ff9d;
border:none;
border-radius:10px;
cursor:pointer;
font-family:'Space Grotesk',sans-serif;
font-weight:500;
}

</style>
</head>

<body>

<div id="boot">

<div class="boot-line">Initializing Ritual Interface...</div>
<div class="boot-line">Loading Siggy Core...</div>
<div class="boot-line">Connecting to Ritual Network...</div>
<div class="boot-line">Siggy Terminal Ready</div>

</div>

<div id="app">

<canvas id="particles"></canvas>

<div class="chat-container">

<div class="avatar">
<img src="https://i.postimg.cc/XvF8ngRQ/file-00000000867471fa909a2899980f0939.png">
</div>

<h1>Siggy Terminal</h1>

<div id="chat"></div>

<div class="quick">
<button onclick="quick('Who is Siggy')">Who Is Siggy</button>
<button onclick="quick('Explain Ritual in simple terms')">Explain Ritual</button>
<button onclick="quick('How does Ritual work')">How Ritual Works</button>
</div>

<div class="input-box">
<input id="message" placeholder="Ask Siggy something...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script>

/* boot transition */

setTimeout(()=>{

document.getElementById("boot").style.display="none";
document.getElementById("app").style.display="block";

},4000);

const API_KEY="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";

let memory=JSON.parse(localStorage.getItem("siggyMemory")||"[]");

const chat=document.getElementById("chat");

async function sendMessage(){

const input=document.getElementById("message");

let msg=input.value;

if(!msg)return;

chat.innerHTML+=`<div class="user"><b>You:</b> ${msg}</div>`;

memory.push({role:"user",content:msg});

input.value="";

const typing=document.createElement("div");

typing.className="typing";

typing.innerHTML=`<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;

chat.appendChild(typing);

const response=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},

body:JSON.stringify({

model:"openai/gpt-4o-mini",

messages:[
{
role:"system",
content:`You are Siggy, the mysterious cat guide of the Ritual ecosystem.

Explain Ritual AI infrastructure clearly and in a fun way.`
},
...memory.slice(-6)
]

})

});

const data=await response.json();

typing.remove();

let reply=data.choices[0].message.content;

memory.push({role:"assistant",content:reply});

localStorage.setItem("siggyMemory",JSON.stringify(memory));

type(reply);

}

function type(text){

const div=document.createElement("div");
div.className="bot";
chat.appendChild(div);

let i=0;

const t=setInterval(()=>{

div.innerHTML="<b>Siggy:</b> "+text.substring(0,i);

i++;

if(i>text.length)clearInterval(t);

chat.scrollTop=chat.scrollHeight;

},18);

}

function quick(q){
document.getElementById("message").value=q;
sendMessage();
}

</script>

</body>
</html>
